<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - INVEST PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #121a8f; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #1a202c; }
        
        .auth-container { background: white; width: 100%; max-width: 400px; padding: 35px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; margin: 20px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { margin: 0; color: var(--primary); font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .logo p { margin: 5px 0 0 0; font-size: 13px; color: #718096; }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 12px; font-weight: 800; color: #4a5568; margin-bottom: 8px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px 15px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; transition: 0.3s; box-sizing: border-box; font-family: 'Inter', sans-serif; background: #f8fafc; }
        .input-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(18, 26, 143, 0.1); }
        
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { background: #a0aec0; cursor: not-allowed; }
        
        .auth-links { text-align: center; margin-top: 25px; font-size: 13px; color: #4a5568; }
        .auth-links a { color: var(--primary); font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">
            <h1>INVEST PRO</h1>
            <p>Đăng nhập để quản lý tài sản</p>
        </div>

        <div class="input-group">
            <label>Số điện thoại</label>
            <input type="tel" id="log-phone" placeholder="Nhập số điện thoại...">
        </div>
        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="log-pass" placeholder="Nhập mật khẩu...">
        </div>
        
        <button class="btn-submit" id="btn-login" onclick="loginAccount()">Đăng Nhập</button>
        
        <div class="auth-links">
            Chưa có tài khoản? <a href="dang-ky.html">Đăng ký ngay</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
            authDomain: "investpro-data.firebaseapp.com",
            projectId: "investpro-data",
            storageBucket: "investpro-data.firebasestorage.app",
            messagingSenderId: "91038630825",
            appId: "1:91038630825:web:fba110e17307e1ad4abab8",
            measurementId: "G-YBYB26BGKT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Chặn người dùng nếu đã đăng nhập rồi thì cho vào thẳng Dashboard
        window.onload = () => {
            if(localStorage.getItem('thongTinTaiKhoan')) {
                window.location.href = "dashboard.html";
            }
        };

        window.loginAccount = async () => {
            const phone = document.getElementById('log-phone').value.trim();
            const pass = document.getElementById('log-pass').value.trim();

            if (!phone || !pass) {
                return alert("⚠️ Vui lòng nhập số điện thoại và mật khẩu!");
            }

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            btn.innerText = "Đang kiểm tra...";

            try {
                const userRef = doc(db, "users", phone);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    if (userData.password === pass) {
                        // Đăng nhập thành công, lưu thông tin vào máy
                        localStorage.setItem('thongTinTaiKhoan', JSON.stringify({
                            phone: userData.phone,
                            name: userData.name
                        }));
                        window.location.href = "dashboard.html";
                    } else {
                        alert("❌ Sai mật khẩu!");
                        btn.disabled = false;
                        btn.innerText = "Đăng Nhập";
                    }
                } else {
                    alert("❌ Tài khoản không tồn tại!");
                    btn.disabled = false;
                    btn.innerText = "Đăng Nhập";
                }
            } catch (error) {
                console.error(error);
                alert("❌ Lỗi kết nối máy chủ!");
                btn.disabled = false;
                btn.innerText = "Đăng Nhập";
            }
        };

        // Bấm Enter để đăng nhập
        document.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                loginAccount();
            }
        });
    </script>
</body>
</html>
