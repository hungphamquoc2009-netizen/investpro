<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập / Đăng Ký - INVEST PRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f4f6f9 0%, #e0e5ec 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background-color: #fff; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .auth-header { background-color: #121a8f; padding: 20px; text-align: center; }
        .auth-header h2 { color: white; margin: 0 0 15px 0; font-weight: 900; letter-spacing: 1px; }
        .tab-group { display: flex; background-color: rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background-color: #fff; color: #121a8f; }
        .form-area { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #121a8f; }
        .submit-btn { width: 100%; padding: 14px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #27ae60; }
        .submit-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .util-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 13px; }
        .util-links a { color: #121a8f; text-decoration: none; }
        .util-links a:hover { text-decoration: underline; }
        #register-form { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h2>INVEST PRO</h2>
            <div class="tab-group">
                <div class="tab-btn active" id="tab-login" onclick="switchTab('login')">Đăng Nhập</div>
                <div class="tab-btn" id="tab-register" onclick="switchTab('register')">Đăng Ký</div>
            </div>
        </div>

        <div class="form-area">
            <form id="login-form">
                <div class="form-group">
                    <label>Số điện thoại hoặc ID</label>
                    <input type="text" id="login-phone" placeholder="VD: 0988... hoặc 0001" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="login-pass" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="submit-btn" id="btn-login">Đăng Nhập</button>
                <div class="util-links">
                    <a href="#">Quên mật khẩu?</a>
                    <a href="index.html">← Về Trang chủ</a>
                </div>
            </form>

            <form id="register-form">
                <div class="form-group">
                    <label>Họ và Tên</label>
                    <input type="text" id="reg-name" placeholder="Ví dụ: Nguyen Van A" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="reg-phone" placeholder="Nhập số điện thoại (10 số)" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="reg-pass" placeholder="Tối thiểu 8 ký tự" required>
                </div>
                <div class="form-group">
                    <label style="color: #e74c3c; font-weight: bold;">Mã Mời (Nếu có)</label>
                    <input type="text" id="reg-invite" placeholder="Ví dụ: 0001" style="border-color: #f1c40f;">
                </div>
                <button type="submit" class="submit-btn" id="btn-register">Tạo Tài Khoản</button>
                <div class="util-links">
                    <div style="flex:1"></div>
                    <a href="index.html">← Về Trang chủ</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
            authDomain: "investpro-data.firebaseapp.com",
            projectId: "investpro-data",
            storageBucket: "investpro-data.firebasestorage.app",
            messagingSenderId: "91038630825",
            appId: "1:91038630825:web:fba110e17307e1ad4abab8",
            measurementId: "G-YBYB26BGKT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- HÀM CHUYỂN TAB (Đăng nhập / Đăng ký) ---
        window.switchTab = function(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        // ================= XỬ LÝ ĐĂNG KÝ (FIREBASE) =================
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // CHẶN LOAD LẠI TRANG
            
            const btn = document.getElementById('btn-register');
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const inviteCode = document.getElementById('reg-invite').value.trim();

            if (!/^0\d{9}$/.test(phone)) return alert("Số điện thoại phải có 10 số!");
            if (pass.length < 8) return alert("Mật khẩu phải có ít nhất 8 ký tự!");

            btn.disabled = true;
            btn.innerText = "Đang xử lý...";

            try {
                // Kiểm tra xem SĐT đã tồn tại trên mây chưa
                const userSnap = await getDoc(doc(db, "users", phone));
                if (userSnap.exists()) {
                    alert("Số điện thoại này đã được sử dụng!");
                    btn.disabled = false;
                    btn.innerText = "Tạo Tài Khoản";
                    return;
                }

                // Lấy tổng số user để tạo ID ngẫu nhiên hoặc tịnh tiến
                const allUsers = await getDocs(collection(db, "users"));
                const newId = (allUsers.size + 1).toString().padStart(4, '0');

                const newUser = {
                    id: newId,
                    name: name,
                    phone: phone,
                    password: pass,
                    balance: 0,
                    status: 'Chưa kích hoạt',
                    referredBy: inviteCode || null,
                    investments: [],
                    history: [],
                    createdAt: Date.now()
                };

                // Đẩy dữ liệu lên Firebase
                await setDoc(doc(db, "users", phone), newUser);
                
                alert(`🎉 Đăng ký thành công!\nID của bạn là: #${newId}\nVui lòng đăng nhập.`);
                document.getElementById('register-form').reset();
                window.switchTab('login');
                document.getElementById('login-phone').value = phone;

            } catch (err) {
                alert("Lỗi đăng ký: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Tạo Tài Khoản";
            }
        });

        // ================= XỬ LÝ ĐĂNG NHẬP (FIREBASE) =================
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // CHẶN LOAD LẠI TRANG
            
            const btn = document.getElementById('btn-login');
            const input = document.getElementById('login-phone').value.trim();
            const pass = document.getElementById('login-pass').value;

            btn.disabled = true;
            btn.innerText = "Đang kiểm tra...";

            try {
                let user = null;
                
                // 1. Thử tìm theo Số điện thoại
                const snapPhone = await getDoc(doc(db, "users", input));
                if (snapPhone.exists()) {
                    user = snapPhone.data();
                } else {
                    // 2. Thử tìm theo Mã ID (nếu khách nhập 0001, 0002)
                    const q = query(collection(db, "users"), where("id", "==", input));
                    const snapId = await getDocs(q);
                    if (!snapId.empty) user = snapId.docs[0].data();
                }

                // 3. Kiểm tra mật khẩu
                if (user && user.password === pass) {
                    if (user.status === 'Đã Khóa') {
                        alert("Tài khoản của bạn đã bị khóa!");
                        btn.disabled = false;
                        btn.innerText = "Đăng Nhập";
                        return;
                    }
                    
                    // LƯU PHIÊN ĐĂNG NHẬP VÀO TRÌNH DUYỆT ĐỂ DÙNG CHO DASHBOARD
                    localStorage.setItem('thongTinTaiKhoan', JSON.stringify({
                        phone: user.phone,
                        name: user.name
                    }));
                    
                    // Chuyển hướng
                    window.location.href = "dashboard.html";
                } else {
                    alert("Tài khoản hoặc mật khẩu không chính xác!");
                }
            } catch (err) {
                alert("Lỗi kết nối Firebase: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Đăng Nhập";
            }
        });
    </script>
</body>
</html>
