<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập / Đăng Ký - INVEST PRO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f4f6f9 0%, #e0e5ec 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background-color: #fff; width: 100%; max-width: 400px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .auth-header { background-color: #121a8f; padding: 20px; text-align: center; }
        .auth-header h2 { color: white; margin: 0 0 15px 0; font-weight: 900; letter-spacing: 1px; }
        .tab-group { display: flex; background-color: rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { background-color: #fff; color: #121a8f; }
        .form-area { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #121a8f; }
        .submit-btn { width: 100%; padding: 14px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #27ae60; }
        .util-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 13px; }
        .util-links a { color: #121a8f; text-decoration: none; }
        .util-links a:hover { text-decoration: underline; }
        #register-form { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h2>INVEST PRO</h2>
            <div class="tab-group">
                <div class="tab-btn active" id="tab-login" onclick="switchTab('login')">Đăng Nhập</div>
                <div class="tab-btn" id="tab-register" onclick="switchTab('register')">Đăng Ký</div>
            </div>
        </div>

        <div class="form-area">
            <form id="login-form" onsubmit="xuLyDangNhap(event)">
                <div class="form-group">
                    <label>Số điện thoại hoặc ID Khách hàng</label>
                    <input type="text" placeholder="VD: 0988... hoặc 0001" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="submit-btn">Đăng Nhập</button>
                <div class="util-links">
                    <a href="#">Quên mật khẩu?</a>
                    <a href="index.html">← Về Trang chủ</a>
                </div>
            </form>

            <form id="register-form" onsubmit="xuLyDangKy(event)">
                <div class="form-group">
                    <label>Họ và Tên</label>
                    <input type="text" placeholder="Ví dụ: Nguyen Van A" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" placeholder="Nhập số điện thoại (10 số, bắt đầu bằng 0)" required>
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Tối thiểu 8 ký tự (gồm chữ và số)" required>
                </div>
                
                <div class="form-group">
                    <label style="color: #e74c3c; font-weight: bold;">Mã Mời / ID Người Giới Thiệu (Nếu có)</label>
                    <input type="text" id="ma-moi-nhap" placeholder="Ví dụ: 0001" style="border-color: #f1c40f;">
                </div>

                <button type="submit" class="submit-btn">Tạo Tài Khoản</button>
                <div class="util-links">
                    <div style="flex:1"></div>
                    <a href="index.html">← Về Trang chủ</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
        }

        // --- XỬ LÝ ĐĂNG KÝ VỚI ĐIỀU KIỆN MỚI ---
        function xuLyDangKy(event) {
            event.preventDefault();
            
            let inputs = document.querySelectorAll('#register-form input[required]');
            let fullName = inputs[0].value.trim();
            let phone = inputs[1].value.trim();
            let password = inputs[2].value;
            
            // 1. Kiểm tra SĐT: Bắt đầu bằng 0 và có đúng 10 chữ số
            let phoneRegex = /^0\d{9}$/; 
            if (!phoneRegex.test(phone)) {
                alert("Số điện thoại không hợp lệ!\nPhải bắt đầu bằng số 0 và có đúng 10 chữ số.");
                return;
            }

            // 2. Kiểm tra mật khẩu: Ít nhất 8 ký tự, có cả chữ và số
            let passRegex = /^(?=.*[A-Za-z])(?=.*\d).{8,}$/;
            if (!passRegex.test(password)) {
                alert("Mật khẩu yếu!\nPhải có ít nhất 8 ký tự, bao gồm cả chữ và số.");
                return;
            }
            
            let maMoiNhapVao = document.getElementById('ma-moi-nhap').value.trim();
            let danhSachUsers = JSON.parse(localStorage.getItem('database_nguoidung')) || [];

            if (danhSachUsers.find(user => user.phone === phone)) {
                alert("Số điện thoại này đã được đăng ký!");
                return;
            }

            let sdtNguoiGioiThieu = null;
            if (maMoiNhapVao !== "") {
                if(!isNaN(maMoiNhapVao)) {
                    maMoiNhapVao = maMoiNhapVao.padStart(4, '0');
                }
                let nguoiGioiThieu = danhSachUsers.find(user => user.id === maMoiNhapVao);
                if (!nguoiGioiThieu) {
                    alert("Mã mời không tồn tại!");
                    return;
                }
                sdtNguoiGioiThieu = nguoiGioiThieu.phone; 
            }

            let idMoi = (danhSachUsers.length + 1).toString().padStart(4, '0');

            let khachHangMoi = {
                id: idMoi,
                name: fullName,
                phone: phone,
                password: password,
                balance: 0,
                status: 'Hoạt động',
                myInviteCode: idMoi, 
                referredBy: sdtNguoiGioiThieu 
            };

            danhSachUsers.push(khachHangMoi);
            localStorage.setItem('database_nguoidung', JSON.stringify(danhSachUsers));

            alert(`🎉 ĐĂNG KÝ THÀNH CÔNG!\nID của bạn là: ${idMoi}`);
            switchTab('login'); 
            document.getElementById('register-form').reset(); 
        }

        function xuLyDangNhap(event) {
            event.preventDefault(); 
            let inputs = document.querySelectorAll('#login-form input');
            let tenDangNhap = inputs[0].value.trim();
            let passInput = inputs[1].value;

            let danhSachUsers = JSON.parse(localStorage.getItem('database_nguoidung')) || [];
            let userHopLe = danhSachUsers.find(user => 
                (user.phone === tenDangNhap || user.id === tenDangNhap) && user.password === passInput
            );

            if (userHopLe) {
                if(userHopLe.status === 'Đã Khóa') {
                    alert("Tài khoản bị khóa!"); return;
                }
                localStorage.setItem('thongTinTaiKhoan', JSON.stringify(userHopLe));
                window.location.href = "dashboard.html"; 
            } else {
                alert("Thông tin đăng nhập không chính xác!");
            }
        }
    </script>
</body>
</html>
