<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Kết Ngân Hàng</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f3f7; margin: 0; padding: 0; }
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; }
        .back-btn { text-decoration: none; color: #333; font-size: 20px; margin-right: 15px; font-weight: bold; }
        .card { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .form-group { margin-bottom: 15px; }
        label { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; background: #f9f9f9; }
        input:focus, select:focus { border-color: #2ecc71; background: white; }
        .btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 15px; }
        
        .bank-card { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; padding: 20px; border-radius: 15px; margin: 15px; display: none; }
        .bank-card h2 { margin: 0 0 15px 0; font-size: 18px; }
        .bank-card p { margin: 5px 0; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="header">
        <a href="dashboard.html" class="back-btn">❮</a>
        <b style="font-size: 16px;">Tài Khoản Thụ Hưởng</b>
    </div>

    <div class="bank-card" id="linked-bank-card">
        <h2>💳 Ngân hàng đã liên kết</h2>
        <p>Ngân hàng: <b id="lb-name">---</b></p>
        <p>Số tài khoản: <b id="lb-stk">---</b></p>
        <p>Chủ tài khoản: <b id="lb-owner">---</b></p>
        <button style="background: white; color: #27ae60; border: none; padding: 5px 15px; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold;" onclick="showForm()">Thay đổi thẻ</button>
    </div>

    <div class="card" id="bank-form">
        <p style="font-size: 12px; color: #e74c3c; margin-top: 0;">* Lưu ý: Tên chủ tài khoản phải trùng với tên đăng ký. Nhập sai sẽ không rút được tiền.</p>
        
        <div class="form-group">
            <label>Chọn Ngân hàng</label>
            <select id="b-name">
                <option value="">-- Chọn ngân hàng --</option>
                <option value="MBBank">MB Bank</option>
                <option value="Vietcombank">Vietcombank</option>
                <option value="Techcombank">Techcombank</option>
                <option value="Agribank">Agribank</option>
                <option value="Vietinbank">Vietinbank</option>
                <option value="Momo">Ví Momo</option>
            </select>
        </div>
        <div class="form-group"><label>Số tài khoản / SĐT Momo</label><input type="number" id="b-stk" placeholder="Nhập số tài khoản"></div>
        <div class="form-group"><label>Tên chủ tài khoản</label><input type="text" id="b-owner" placeholder="VIET HOA KHONG DAU"></div>
        
        <button class="btn" onclick="saveBank()">XÁC NHẬN LIÊN KẾT</button>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem("thongTinTaiKhoan"));
        let db = JSON.parse(localStorage.getItem("database_nguoidung")) || [];
        const userIdx = db.findIndex(u => u.phone === session.phone);
        const user = db[userIdx];

        window.onload = function() {
            if(user.bankInfo) {
                // Đã có bank -> Hiện cái thẻ, ẩn cái form
                document.getElementById('bank-form').style.display = 'none';
                document.getElementById('linked-bank-card').style.display = 'block';
                document.getElementById('lb-name').innerText = user.bankInfo.bankName;
                document.getElementById('lb-stk').innerText = user.bankInfo.stk;
                document.getElementById('lb-owner').innerText = user.bankInfo.owner;
            }
        }

        function showForm() {
            document.getElementById('bank-form').style.display = 'block';
            document.getElementById('linked-bank-card').style.display = 'none';
        }

        function saveBank() {
            const bName = document.getElementById('b-name').value;
            const bStk = document.getElementById('b-stk').value;
            const bOwner = document.getElementById('b-owner').value.toUpperCase();

            if(!bName || !bStk || !bOwner) return alert("Vui lòng điền đủ thông tin thẻ!");

            db[userIdx].bankInfo = { bankName: bName, stk: bStk, owner: bOwner };
            localStorage.setItem("database_nguoidung", JSON.stringify(db));
            alert("Liên kết ngân hàng thành công!");
            location.reload();
        }
    </script>
</body>
</html>
