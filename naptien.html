<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Toán QR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #ffffff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        /* BƯỚC 1: CHỌN TIỀN (VẪN GIỮ ĐỂ BIẾT NẠP BAO NHIÊU) */
        #step-1 { padding: 20px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .amount-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .amount-item { background: #f4f7f6; padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-weight: 700; border: 1px solid #eee; }
        .amount-item.active { background: #121a8f; color: white; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 20px; outline: none; }
        .btn-next { width: 100%; padding: 16px; background: #121a8f; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }

        /* BƯỚC 2: CHỈ CÓ QR */
        #payment-info { display: none; text-align: center; width: 100%; }
        #qr-img { width: 85vw; max-width: 350px; height: auto; display: block; margin: 0 auto; }
        
        .btn-confirm { margin-top: 30px; width: 80%; max-width: 300px; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .btn-back { margin-top: 20px; background: none; border: none; color: #999; font-size: 13px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="step-1">
        <h2 style="text-align: center; color: #121a8f;">Nạp Tiền</h2>
        <div class="amount-grid">
            <div class="amount-item" onclick="selectAmount(60000, this)">60k</div>
            <div class="amount-item" onclick="selectAmount(200000, this)">200k</div>
            <div class="amount-item" onclick="selectAmount(500000, this)">500k</div>
            <div class="amount-item" onclick="selectAmount(1000000, this)">1M</div>
            <div class="amount-item" onclick="selectAmount(5000000, this)">5M</div>
            <div class="amount-item" onclick="selectAmount(10000000, this)">10M</div>
        </div>
        <input type="number" id="custom-amount" placeholder="Nhập số tiền...">
        <button class="btn-next" onclick="goToPayment()">TIẾP THEO</button>
    </div>

    <div id="payment-info">
        <img id="qr-img" src="" alt="Mã QR">
        <button class="btn-confirm" onclick="submitDeposit()">XÁC NHẬN ĐÃ CHUYỂN</button>
        <br>
        <button class="btn-back" onclick="location.reload()">Quay lại chỉnh tiền</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ", authDomain: "investpro-data.firebaseapp.com", projectId: "investpro-data", storageBucket: "investpro-data.firebasestorage.app", messagingSenderId: "91038630825", appId: "1:91038630825:web:fba110e17307e1ad4abab8" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let selectedAmount = 0, currentUser = null;
        let adminBank = { bankId: "mbbank", stk: "00003052009", name: "NGUYEN THE ANH" };

        window.onload = async () => {
            const ss = JSON.parse(localStorage.getItem('thongTinTaiKhoan'));
            if(!ss) return location.href="dang-nhap.html";
            const uSnap = await getDoc(doc(db, "users", ss.phone));
            if(uSnap.exists()) currentUser = uSnap.data();

            const cfg = await getDoc(doc(db, "config", "bank"));
            if(cfg.exists()) adminBank = cfg.data();
        };

        window.selectAmount = (val, el) => {
            selectedAmount = val;
            document.querySelectorAll('.amount-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('custom-amount').value = val;
        };

        window.goToPayment = () => {
            const inputVal = document.getElementById('custom-amount').value;
            if(inputVal) selectedAmount = Number(inputVal);
            if(selectedAmount < 30000) return alert("Tối thiểu 30k!");

            document.getElementById('step-1').style.display = 'none';
            document.getElementById('payment-info').style.display = 'block';
            
            const note = "NAP " + (currentUser.id || "0000");
            const qrUrl = `https://img.vietqr.io/image/${adminBank.bankId}-${adminBank.stk}-compact2.png?amount=${selectedAmount}&addInfo=${encodeURIComponent(note)}&accountName=${encodeURIComponent(adminBank.name)}`;
            document.getElementById('qr-img').src = qrUrl;
        };

        window.submitDeposit = async () => {
            try {
                const userRef = doc(db, "users", currentUser.phone);
                const userSnap = await getDoc(userRef);
                let hist = userSnap.data().history || [];
                const note = "NAP " + (currentUser.id || "0000");
                hist.unshift({ id: "NAP"+Date.now().toString().slice(-4), type: "Nạp tiền", amount: "+" + selectedAmount.toLocaleString() + " ₫", time: new Date().toLocaleString('vi-VN'), status: "Chờ duyệt", color: "orange", note: note });
                await updateDoc(userRef, { history: hist });
                alert("✅ Đã gửi lệnh! Admin sẽ duyệt sau khi nhận được tiền.");
                location.href = "dashboard.html";
            } catch(e) { alert("Lỗi: " + e.message); }
        };
    </script>
</body>
</html>
