<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nạp Tiền - INVEST PRO</title>
    <style>
        :root { --primary: #ff9800; --bg: #f5f5f5; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; }
        
        /* Header có nút quay lại nhỏ */
        .header { background: white; padding: 12px 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 20px; color: #666; text-decoration: none; width: 30px; cursor: pointer; }
        .header-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; margin-right: 30px; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        h3 { font-size: 15px; margin: 15px 0 10px; color: #333; font-weight: 600; }

        /* Grid mệnh giá từ 50 đến 5.000 */
        .amount-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .amount-item { background: white; border: 1px solid #e0e0e0; padding: 12px 0; border-radius: 6px; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .amount-item.active { border-color: var(--primary); color: var(--primary); background: #fff8ef; box-shadow: 0 0 0 1px var(--primary); }

        /* Ô nhập tiền tự do */
        .input-area { background: white; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 15px; display: flex; align-items: center; margin-bottom: 5px; }
        .input-area input { border: none; outline: none; flex: 1; font-size: 16px; font-weight: bold; color: #333; }
        .input-area input::placeholder { color: #bbb; font-weight: normal; font-size: 14px; }
        .rate-note { font-size: 12px; color: #888; margin-bottom: 20px; }

        /* Nút nạp tiền lớn */
        .btn-submit { width: 100%; padding: 15px; background: #ff9800; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 152, 0, 0.3); }
        .btn-submit:active { transform: scale(0.98); }

        /* Modal QR chuyên nghiệp */
        #qr-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .qr-box { background: white; width: 100%; max-width: 380px; border-radius: 15px; padding: 20px; text-align: center; position: relative; }
        .qr-box img { width: 220px; height: 220px; margin: 15px 0; border: 1px solid #eee; }
        .qr-info { text-align: left; background: #f9f9f9; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
        .qr-info b { color: #d32f2f; }
        .btn-done { background: #4caf50; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html" class="back-btn">❮</a>
    <div class="header-title">Nạp Tiền</div>
</div>

<div class="container">
    <h3>Số tiền nạp</h3>
    <div class="amount-grid" id="grid">
        <div class="amount-item" onclick="pick(50)">50</div>
        <div class="amount-item" onclick="pick(100)">100</div>
        <div class="amount-item" onclick="pick(200)">200</div>
        <div class="amount-item" onclick="pick(500)">500</div>
        <div class="amount-item" onclick="pick(1000)">1,000</div>
        <div class="amount-item" onclick="pick(2000)">2,000</div>
        <div class="amount-item" onclick="pick(3000)">3,000</div>
        <div class="amount-item" onclick="pick(5000)">5,000</div>
    </div>

    <div class="input-area">
        <span style="color:#ff9800; margin-right:10px;">⚙️</span>
        <input type="number" id="inp-amt" placeholder="Tối thiểu 50~tối đa 300,000">
    </div>
    <div class="rate-note">1 = 1,000₫</div>

    <button class="btn-submit" onclick="requestNap()">Nạp Tiền Ngay</button>
</div>

<div id="qr-overlay">
    <div class="qr-box">
        <h3 style="margin-top:0">Quét Mã QR Thanh Toán</h3>
        <img src="" id="img-qr">
        <div class="qr-info">
            <p>Ngân hàng: <span id="view-bank" style="font-weight:bold"></span></p>
            <p>Số tài khoản: <span id="view-stk" style="font-weight:bold"></span></p>
            <p>Nội dung: <b id="view-desc"></b></p>
            <p style="color:#888; font-size:11px; margin-top:5px;">* Vui lòng chuyển đúng số tiền và nội dung để được duyệt nhanh.</p>
        </div>
        <button class="btn-done" onclick="submitToAdmin()">Tôi Đã Chuyển Khoản</button>
        <p onclick="closeQR()" style="margin-top:15px; font-size:13px; color:#999; cursor:pointer;">Hủy bỏ</p>
    </div>
</div>

<script>
    const session = JSON.parse(localStorage.getItem("thongTinTaiKhoan"));

    function pick(val) {
        document.getElementById('inp-amt').value = val;
        // Đổi màu nút được chọn
        const items = document.querySelectorAll('.amount-item');
        items.forEach(i => i.classList.remove('active'));
        event.target.classList.add('active');
    }

    function requestNap() {
        const val = document.getElementById('inp-amt').value;
        const cfg = JSON.parse(localStorage.getItem("admin_bank_config"));
        
        if(!val || val < 50) return alert("Vui lòng nhập/chọn số tiền tối thiểu 50 (50.000₫)");
        if(!cfg) return alert("Hệ thống chưa cấu nhận tiền. Vui lòng thử lại sau!");

        const realMoney = val * 1000;
        const desc = "NAP " + session.phone;

        // Tạo VietQR URL
        const qrUrl = `https://img.vietqr.io/image/${cfg.bank}-${cfg.stk}-compact2.png?amount=${realMoney}&addInfo=${encodeURIComponent(desc)}&accountName=${encodeURIComponent(cfg.name)}`;
        
        document.getElementById("img-qr").src = qrUrl;
        document.getElementById("view-bank").innerText = cfg.bank.toUpperCase();
        document.getElementById("view-stk").innerText = cfg.stk;
        document.getElementById("view-desc").innerText = desc;
        
        document.getElementById("qr-overlay").style.display = "flex";
    }

    function closeQR() {
        document.getElementById("qr-overlay").style.display = "none";
    }

    function submitToAdmin() {
        const val = document.getElementById('inp-amt').value;
        const realMoney = val * 1000;
        
        const order = {
            orderId: "NAP" + Math.floor(Math.random()*900000),
            phone: session.phone,
            userName: session.name,
            amount: Number(realMoney),
            status: "Chờ duyệt",
            time: new Date().toLocaleString()
        };

        let list = JSON.parse(localStorage.getItem("database_lenh_nap")) || [];
        list.push(order);
        localStorage.setItem("database_lenh_nap", JSON.stringify(list));

        alert("✅ Yêu cầu đã được gửi! Vui lòng chờ Admin duyệt.");
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>
