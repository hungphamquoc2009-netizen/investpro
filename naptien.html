<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
        authDomain: "investpro-data.firebaseapp.com",
        projectId: "investpro-data",
        storageBucket: "investpro-data.firebasestorage.app",
        messagingSenderId: "91038630825",
        appId: "1:91038630825:web:fba110e17307e1ad4abab8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.xacNhanNap = async (amount) => {
        const rawSS = localStorage.getItem('thongTinTaiKhoan');
        if(!rawSS) return alert("Vui lòng đăng nhập lại!");
        const ss = JSON.parse(rawSS);

        try {
            const userRef = doc(db, "users", ss.phone);
            const userSnap = await getDoc(userRef);
            
            if (userSnap.exists()) {
                const userData = userSnap.data();
                const history = userData.history || [];
                
                // TẠO LỆNH NẠP CHUẨN ĐỂ ADMIN ĐỌC ĐƯỢC
                const newOrder = {
                    id: "NAP" + Date.now().toString().slice(-6),
                    type: "Nạp tiền", // Tên phải khớp với admin quét
                    amount: "+" + Number(amount).toLocaleString() + " ₫",
                    time: new Date().toLocaleString('vi-VN'),
                    status: "Chờ duyệt",
                    color: "orange"
                };

                history.unshift(newOrder);
                await updateDoc(userRef, { history: history });
                
                alert("✅ Gửi yêu cầu nạp tiền thành công! Vui lòng chờ Admin duyệt.");
                window.location.href = "dashboard.html";
            }
        } catch (e) {
            alert("Lỗi kết nối: " + e.message);
        }
    };
</script>
