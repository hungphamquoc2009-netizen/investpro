<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f3f7; margin: 0; padding: 0; }
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; }
        .back-btn { text-decoration: none; color: #333; font-size: 20px; margin-right: 15px; font-weight: bold; }
        .card { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .form-group { margin-bottom: 15px; }
        label { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; background: #f9f9f9; }
        input:focus { border-color: #121a8f; background: white; }
        .btn { width: 100%; padding: 12px; background: #121a8f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="dashboard.html" class="back-btn">❮</a>
        <b style="font-size: 16px;">Thông tin & Mật khẩu</b>
    </div>

    <div class="card">
        <h3 style="margin-top:0;">Tài khoản của bạn</h3>
        <div class="form-group"><label>Họ và Tên</label><input type="text" id="i-name" readonly></div>
        <div class="form-group"><label>Số điện thoại</label><input type="text" id="i-phone" readonly></div>
        <div class="form-group"><label>Mã giới thiệu (ID)</label><input type="text" id="i-id" readonly></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; color: #e74c3c;">Đổi mật khẩu</h3>
        <div class="form-group"><label>Mật khẩu cũ</label><input type="password" id="old-pass" placeholder="Nhập mật khẩu hiện tại"></div>
        <div class="form-group"><label>Mật khẩu mới</label><input type="password" id="new-pass" placeholder="Nhập mật khẩu mới"></div>
        <button class="btn" onclick="changePassword()">Cập Nhật Mật Khẩu</button>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem("thongTinTaiKhoan"));
        let db = JSON.parse(localStorage.getItem("database_nguoidung")) || [];
        const userIdx = db.findIndex(u => u.phone === session.phone);
        const user = db[userIdx];

        // Điền thông tin
        document.getElementById('i-name').value = user.name;
        document.getElementById('i-phone').value = user.phone;
        document.getElementById('i-id').value = user.id;

        function changePassword() {
            const oldP = document.getElementById('old-pass').value;
            const newP = document.getElementById('new-pass').value;

            if(!oldP || !newP) return alert("Vui lòng điền đủ thông tin!");
            if(oldP !== user.password) return alert("Mật khẩu cũ không chính xác!");
            if(newP.length < 6) return alert("Mật khẩu mới phải từ 6 ký tự!");

            db[userIdx].password = newP;
            localStorage.setItem("database_nguoidung", JSON.stringify(db));
            alert("Đổi mật khẩu thành công! Vui lòng đăng nhập lại.");
            window.location.href = "dang-nhap.html";
        }
    </script>
</body>
</html>
