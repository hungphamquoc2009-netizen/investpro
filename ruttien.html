<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rút Tiền - INVEST PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #121a8f; --orange: #ff9800; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1a202c; }
        
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 24px; text-decoration: none; color: #333; margin-right: 15px; cursor: pointer; }
        h2 { margin: 0; font-size: 18px; font-weight: 800; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .balance-card { background: var(--primary); color: white; padding: 20px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(18, 26, 143, 0.2); }
        .balance-label { font-size: 12px; opacity: 0.8; margin-bottom: 5px; }
        .balance-value { font-size: 24px; font-weight: 800; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; background: white; }
        .form-group input:focus { border-color: var(--primary); }

        .note { background: #fff5f5; border: 1px solid #fed7d7; color: #c53030; padding: 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; margin-bottom: 20px; }

        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.98); opacity: 0.9; }
        .btn-submit:disabled { background: #cbd5e0; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html" class="back-btn">❮</a>
        <h2>Rút Tiền Về Ngân Hàng</h2>
    </div>

    <div class="container">
        <div class="balance-card">
            <div class="balance-label">Số dư khả dụng</div>
            <div class="balance-value" id="view-balance">0 ₫</div>
        </div>

        <div class="note">
            ⚠️ <b>Lưu ý:</b> Vui lòng kiểm tra kỹ thông tin ngân hàng. Lệnh rút tiền sẽ được xử lý trong vòng 5-30 phút. Phí rút tiền là 0%.
        </div>

        <form id="withdraw-form">
            <div class="form-group">
                <label>Ngân hàng nhận</label>
                <select id="w-bank" required>
                    <option value="">-- Chọn ngân hàng --</option>
                    <option value="Vietcombank">Vietcombank</option>
                    <option value="MB Bank">MB Bank</option>
                    <option value="Techcombank">Techcombank</option>
                    <option value="Viettinbank">Viettinbank</option>
                    <option value="Agribank">Agribank</option>
                    <option value="BIDV">BIDV</option>
                    <option value="TP Bank">TP Bank</option>
                    <option value="Momo">Ví MoMo</option>
                </select>
            </div>

            <div class="form-group">
                <label>Số tài khoản</label>
                <input type="text" id="w-stk" placeholder="Nhập số tài khoản nhận" required>
            </div>

            <div class="form-group">
                <label>Tên chủ tài khoản</label>
                <input type="text" id="w-name" placeholder="Ví dụ: NGUYEN VAN A" required>
            </div>

            <div class="form-group">
                <label>Số tiền rút (Tối thiểu 50.000₫)</label>
                <input type="number" id="w-amount" placeholder="Ví dụ: 100000" required>
            </div>

            <button type="submit" class="btn-submit" id="btn-withdraw">Gửi Yêu Cầu Rút Tiền</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
            authDomain: "investpro-data.firebaseapp.com",
            projectId: "investpro-data",
            storageBucket: "investpro-data.firebasestorage.app",
            messagingSenderId: "91038630825",
            appId: "1:91038630825:web:fba110e17307e1ad4abab8",
            measurementId: "G-YBYB26BGKT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('thongTinTaiKhoan'));
        let currentBalance = 0;

        if(!session) { location.href = "dang-nhap.html"; }

        // 1. Tải số dư thực tế từ Firebase
        async function fetchBalance() {
            const userSnap = await getDoc(doc(db, "users", session.phone));
            if(userSnap.exists()) {
                currentBalance = userSnap.data().balance || 0;
                document.getElementById('view-balance').innerText = currentBalance.toLocaleString() + " ₫";
            }
        }
        fetchBalance();

        // 2. Xử lý gửi lệnh rút
        document.getElementById('withdraw-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-withdraw');
            const amount = Number(document.getElementById('w-amount').value);
            const bank = document.getElementById('w-bank').value;
            const stk = document.getElementById('w-stk').value.trim();
            const name = document.getElementById('w-name').value.trim().toUpperCase();

            // Kiểm tra điều kiện
            if(amount < 50000) return alert("Số tiền rút tối thiểu là 50.000₫!");
            if(amount > currentBalance) return alert("Số dư không đủ để thực hiện lệnh rút này!");

            btn.disabled = true;
            btn.innerText = "Đang gửi yêu cầu...";

            const orderId = "WIT" + Math.floor(Math.random()*900000);
            const withdrawData = {
                orderId: orderId,
                phone: session.phone,
                userName: session.name,
                amount: amount,
                bankInfo: `${bank} | ${stk} | ${name}`,
                status: "Chờ duyệt",
                time: new Date().toLocaleString()
            };

            try {
                // Lưu lệnh rút vào bộ sưu tập "withdraws"
                await setDoc(doc(db, "withdraws", orderId), withdrawData);
                
                alert("✅ Gửi yêu cầu thành công! Admin sẽ duyệt lệnh của bạn sớm nhất.");
                location.href = "dashboard.html";
            } catch (err) {
                alert("Lỗi: " + err.message);
                btn.disabled = false;
                btn.innerText = "Gửi Yêu Cầu Rút Tiền";
            }
        };
    </script>
</body>
</html>
