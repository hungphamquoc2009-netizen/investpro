<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
        authDomain: "investpro-data.firebaseapp.com",
        projectId: "investpro-data",
        storageBucket: "investpro-data.firebasestorage.app",
        messagingSenderId: "91038630825",
        appId: "1:91038630825:web:fba110e17307e1ad4abab8",
        measurementId: "G-YBYB26BGKT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // KIỂM TRA THỬ: Xem trong máy có "Thẻ" không?
    const session = JSON.parse(localStorage.getItem('thongTinTaiKhoan'));
    
    console.log("Dữ liệu đăng nhập hiện có trong máy:", session);

    if(!session) {
        // Thay vì đuổi ra ngay, chúng ta hiện thông báo để debug
        document.getElementById('history-list').innerHTML = `
            <div style="text-align:center; color:red; padding:20px;">
                ⚠️ LỖI: Hệ thống không tìm thấy phiên đăng nhập!<br>
                Hãy quay lại trang <a href="dang-nhap.html">Đăng nhập</a> và thử lại.
            </div>`;
    } else {
        loadHistory();
    }

    async function loadHistory() {
        const container = document.getElementById('history-list');
        let allTransactions = [];
        try {
            // Nạp tiền
            const qDep = query(collection(db, "deposits"), where("phone", "==", session.phone));
            const snapDep = await getDocs(qDep);
            snapDep.forEach(doc => allTransactions.push({...doc.data(), type: "Nạp tiền", color: "#2ecc71", sign: "+"}));

            // Rút tiền
            const qWit = query(collection(db, "withdraws"), where("phone", "==", session.phone));
            const snapWit = await getDocs(qWit);
            snapWit.forEach(doc => allTransactions.push({...doc.data(), type: "Rút tiền", color: "#e74c3c", sign: "-"}));

            allTransactions.sort((a, b) => new Date(b.time) - new Date(a.time));
            if(allTransactions.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">Chưa có giao dịch.</div>';
                return;
            }
            container.innerHTML = allTransactions.map(t => `
                <div class="history-card" style="border-left: 5px solid ${t.color}">
                    <div class="h-left"><div class="h-type">${t.type}</div><div class="h-time">${t.time}</div></div>
                    <div class="h-right"><div class="h-amount" style="color:${t.color}">${t.sign}${Number(t.amount).toLocaleString()} ₫</div><div class="h-status">${t.status}</div></div>
                </div>`).join('');
        } catch (e) { console.error(e); }
    }
</script>
