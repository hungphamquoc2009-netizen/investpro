<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Giao Dịch - INVEST PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #121a8f; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1a202c; }
        
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 24px; text-decoration: none; color: #333; margin-right: 15px; cursor: pointer; }
        h2 { margin: 0; font-size: 18px; font-weight: 800; }

        .container { padding: 15px; }
        .history-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ddd; }
        .h-left { flex: 1; }
        .h-type { font-weight: 800; font-size: 14px; margin-bottom: 4px; }
        .h-time { font-size: 11px; color: #a0aec0; }
        .h-right { text-align: right; }
        .h-amount { font-weight: 800; font-size: 15px; }
        .h-status { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px; display: inline-block; margin-top: 5px; }

        /* Màu sắc trạng thái */
        .status-waiting { background: #fef3c7; color: #b45309; } 
        .status-success { background: #d1fae5; color: #047857; } 
        .status-cancel { background: #fee2e2; color: #b91c1c; }

        #debug-msg { font-size: 12px; color: red; text-align: center; padding: 10px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html" class="back-btn">❮</a>
        <h2>Lịch Sử Giao Dịch</h2>
    </div>

    <div class="container">
        <div id="debug-msg"></div>
        <div id="history-list">
            <div style="text-align: center; padding: 50px; color: #888;">
                <div style="margin-bottom: 10px;">⏳ Đang tải dữ liệu...</div>
                <div style="font-size: 12px;">Nếu chờ quá lâu, hãy đăng nhập lại.</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Đã đổi lệnh import: Lấy trực tiếp getDoc và doc để trỏ vào user
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
            authDomain: "investpro-data.firebaseapp.com",
            projectId: "investpro-data",
            storageBucket: "investpro-data.firebasestorage.app",
            messagingSenderId: "91038630825",
            appId: "1:91038630825:web:fba110e17307e1ad4abab8",
            measurementId: "G-YBYB26BGKT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lấy thông tin phiên đăng nhập
        const session = JSON.parse(localStorage.getItem('thongTinTaiKhoan'));
        const debug = document.getElementById('debug-msg');

        if(!session || !session.phone) {
            debug.style.display = "block";
            debug.innerHTML = "LỖI: Không tìm thấy phiên đăng nhập. Đang về trang Login...";
            setTimeout(() => { location.href = "dang-nhap.html"; }, 2000);
        } else {
            loadHistory();
        }

        async function loadHistory() {
            const container = document.getElementById('history-list');

            try {
                // Gọi thẳng vào tài khoản của user để lấy dữ liệu đồng nhất với Dashboard và Admin
                const userRef = doc(db, "users", session.phone);
                const snap = await getDoc(userRef);

                if (snap.exists()) {
                    const userData = snap.data();
                    const history = userData.history || [];

                    if (history.length === 0) {
                        container.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">Bạn chưa có giao dịch nào.</div>';
                        return;
                    }

                    // Render danh sách (Mảng history đã được lưu theo thứ tự mới nhất ở trên cùng từ trước)
                    container.innerHTML = history.map(t => {
                        let sttClass = "status-waiting";
                        if(t.status === "Thành công") sttClass = "status-success";
                        if(t.status === "Bị hủy") sttClass = "status-cancel";

                        // Set màu dự phòng nếu thiếu
                        let color = t.color || "#333";

                        return `
                            <div class="history-card" style="border-left-color: ${color}">
                                <div class="h-left">
                                    <div class="h-type">${t.type}</div>
                                    <div class="h-time">${t.time}</div>
                                </div>
                                <div class="h-right">
                                    <div class="h-amount" style="color: ${color}">${t.amount}</div>
                                    <div class="h-status ${sttClass}">${t.status}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">Tài khoản không tồn tại.</div>';
                }

            } catch (err) {
                container.innerHTML = '<div style="text-align:center; color:red;">Lỗi kết nối Firebase. Hãy kiểm tra lại kết nối mạng!</div>';
                console.error("Firebase Error:", err);
            }
        }
    </script>
</body>
</html>
