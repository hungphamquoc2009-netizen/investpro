<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Giao Dịch - INVEST PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #121a8f; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1a202c; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 24px; text-decoration: none; color: #333; margin-right: 15px; cursor: pointer; }
        h2 { margin: 0; font-size: 18px; font-weight: 800; }
        
        .history-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ddd; }
        .h-left { flex: 1; }
        .h-type { font-weight: 800; font-size: 14px; margin-bottom: 4px; }
        .h-time { font-size: 11px; color: #a0aec0; }
        .h-right { text-align: right; }
        .h-amount { font-weight: 800; font-size: 15px; }
        .h-status { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }

        /* Màu sắc trạng thái */
        .status-wait { background: #fff3e0; color: #ef6c00; } /* Chờ duyệt */
        .status-success { background: #e8f5e9; color: #2e7d32; } /* Thành công */
        .status-fail { background: #ffebee; color: #c62828; } /* Bị hủy */
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html" class="back-btn">❮</a>
        <h2>Lịch Sử Giao Dịch</h2>
    </div>

    <div id="history-list">
        <div style="text-align: center; padding: 50px; color: #888;">Đang tải dữ liệu từ mây...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLh4yR7q2ymAeIRcnlDdDCNSus4S0gnBQ",
            authDomain: "investpro-data.firebaseapp.com",
            projectId: "investpro-data",
            storageBucket: "investpro-data.firebasestorage.app",
            messagingSenderId: "91038630825",
            appId: "1:91038630825:web:fba110e17307e1ad4abab8",
            measurementId: "G-YBYB26BGKT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // KIỂM TRA ĐĂNG NHẬP (BẢO VỆ CĂN PHÒNG)
        const session = JSON.parse(localStorage.getItem('thongTinTaiKhoan'));
        if(!session) {
            location.href = "dang-nhap.html";
        }

        async function loadHistory() {
            const container = document.getElementById('history-list');
            let allTransactions = [];

            try {
                // 1. Lấy lệnh Nạp tiền
                const qDep = query(collection(db, "deposits"), where("phone", "==", session.phone));
                const snapDep = await getDocs(qDep);
                snapDep.forEach(doc => {
                    allTransactions.push({ ...doc.data(), type: "Nạp tiền", color: "#2ecc71", sign: "+" });
                });

                // 2. Lấy lệnh Rút tiền
                const qWit = query(collection(db, "withdraws"), where("phone", "==", session.phone));
                const snapWit = await getDocs(qWit);
                snapWit.forEach(doc => {
                    allTransactions.push({ ...doc.data(), type: "Rút tiền", color: "#e74c3c", sign: "-" });
                });

                // Sắp xếp theo thời gian (mới nhất lên đầu)
                allTransactions.sort((a, b) => new Date(b.time) - new Date(a.time));

                if(allTransactions.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">Bạn chưa có giao dịch nào.</div>';
                    return;
                }

                container.innerHTML = allTransactions.map(t => {
                    let statusClass = "status-wait";
                    if(t.status === "Thành công") statusClass = "status-success";
                    if(t.status === "Bị hủy") statusClass = "status-fail";

                    return `
                        <div class="history-card" style="border-left-color: ${t.color}">
                            <div class="h-left">
                                <div class="h-type">${t.type}</div>
                                <div class="h-time">${t.time}</div>
                            </div>
                            <div class="h-right">
                                <div class="h-amount" style="color: ${t.color}">${t.sign}${Number(t.amount).toLocaleString()} ₫</div>
                                <div class="h-status ${statusClass}">${t.status}</div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                container.innerHTML = '<div style="color:red; text-align:center;">Lỗi tải dữ liệu.</div>';
                console.error(err);
            }
        }

        loadHistory();
    </script>
</body>
</html>
